<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/all-pages.css" />
    <link rel="stylesheet" href="/public/css/index.css" />
    <title>Página não encontrada - Atus Contábeis</title>
    <style>
        .error-404 {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #212529, #ea9e3b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
    </style>
</head>

<body class="bg-light">

    <header>
        <nav class="navbar navbar-expand-md navbar-light fixed-top bg-white border-bottom py-3">
            <div class="container">
                <a href="/" class="navbar-brand">
                    <img src="/public/img/logo_atus.webp" alt=" Atus Contábeis" height="45">
                </a>

            </div>

        </nav>

    </header>

    <main class="container error-404">
        <h1 class="error-code">404</h1>
        <h2 class="display-6 fw-bold mb-4">Oops! Caminho não encontrado.</h2>
        <p class="lead text-muted mb-5" style="max-width: 500px;">A página que você procura pode ter sido movida,
            excluída ou nunca existiu. Que tal voltar para um ambiente seguro?</p>
        <div class="d-flex gap-3">
            <a href="/" class="btn btn-warning px-4 py-2 fw-bold rounded-pill shadow-sm">Voltar ao Início</a>
            <a href="/contato.html" class="btn btn-outline-dark px-4 py-2 fw-bold rounded-pill">Falar Conosco</a>
        </div>
    </main>

    <footer class="py-3 bg-dark text-white fixed-bottom">
        <div class="container text-center">
            <p class="x-small mb-0 text-white-50">&copy; 2024-2026 Atus Contábeis. Eficiência em cada detalhe.</p>
        </div>
    </footer>

</body>

</html>
